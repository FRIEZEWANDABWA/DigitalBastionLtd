[build]
  publish = "web/out"
  command = "cd web && npm install && npm run build"

[build.environment]
  NODE_VERSION = "18"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[context.production.environment]
  API_URL = "https://your-api-domain.com"

[context.deploy-preview.environment]
  API_URL = "https://your-staging-api.com"